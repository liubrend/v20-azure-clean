# Re-runs the guardrail stack (L1–L4) on a clean machine, on every PR.
# Make these REQUIRED status checks in branch protection so they enforce, not just advise.
# L5 (human approval) is the "require a pull-request review before merge" branch-protection rule.
# Also runs on push to main: without branch protection a direct push skips PR gates entirely,
# so this is the post-hoc detection pass — and deploy workflows require THIS workflow to
# succeed on the pushed SHA before they deploy (see deploy-*.yml "gates" job).
name: agentic-sdlc-gates
on:
  pull_request:
  push:
    branches: [main]

# Least-privilege floor, declared in code so it does not depend on the repo's
# (invisible, mutable) Actions "Workflow permissions" setting. Every job without
# its own block gets exactly this. CONVENTION: any job that calls the GitHub API
# (gh api, or an action that does, e.g. gitleaks) MUST declare its own
# `permissions:` with the scope it needs — otherwise it fails on pull_request
# with "Resource not accessible by integration" (a false gate failure, not a
# real finding). See L1-gitleaks (pull-requests: write) and L4-ai-review
# (pull-requests: read) below.
permissions:
  contents: read

jobs:
  L1-policy:                       # policy checks: security, money-safety rules
    runs-on: ubuntu-latest
    env:
      CODE_ROOT: ${{ vars.CODE_ROOT }}   # repo/Actions variable; falls back to "src" below
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: "Security scan (re-run the pre-commit hook's scanner: scripts/security_precommit.py)"
        run: |
          # PR: diff vs base branch. Push to main: diff vs the pre-push tip (post-hoc detection).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE"...)
          if [ -z "$CHANGED" ]; then
            echo "no changed files to scan"
          else
            python3 scripts/security_precommit.py $CHANGED
          fi
      - name: Resolve code roots (fail closed)
        run: |
          ROOTS="${CODE_ROOT:-src}"   # set CODE_ROOT in repo/Actions vars to override (space-separated)
          for ROOT in $ROOTS; do
            if [ ! -d "$ROOT" ]; then
              echo "::error::code root '$ROOT' not found — set CODE_ROOT (fail closed; refuse to scan nothing)"; exit 1
            fi
          done
          echo "CODE_ROOTS=$ROOTS" >> "$GITHUB_ENV"
      - name: Hub — no hardcoded secrets (fail-closed, shared check)
        run: |
          for ROOT in $CODE_ROOTS; do
            bash scripts/checks/forbid.sh "$ROOT" secret
          done
      # TODO(money-safety): no float-for-money AST rule yet. When added, wire the
      # real check here and negative-test it in selftest.sh (do not re-add a bare
      # `pip install semgrep` with no test behind it). The limit-only order policy
      # is a separate, already-available check: scripts/checks/forbid.sh <root> market.
      - name: ASI04 — AI supply chain manifest (models pinned, tool schemas unmodified, data sources classified)
        run: python3 scripts/checks/ai_sbom_check.py

  L1-dep-review:                   # SCA PR gate: block a diff that adds a newly-vulnerable dep.
    runs-on: ubuntu-latest         # Cheap + only meaningful per-PR (compares base vs head), so it
    if: github.event_name == 'pull_request'   # stays here; the heavier Trivy CVE sweep is nightly
    permissions:                              # (see .github/workflows/security-scan.yml).
      contents: read
      pull-requests: write         # dependency-review posts its summary on the PR
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review (fails on a newly-added HIGH+ vulnerable dep)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  L1-high-risk:                    # a change to a high-risk src/ path (.github/high-risk-paths)
    runs-on: ubuntu-latest         # needs human review: block the PR until a `high-risk-ack` label
    permissions:                   # is applied (or, once a 2nd reviewer exists, a CODEOWNERS review).
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: High-risk change requires human review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          HITS="$(git diff --name-only "$BASE"... | python3 scripts/checks/high_risk.py)"
          if [ -z "$HITS" ]; then echo "no high-risk paths changed"; exit 0; fi
          echo "high-risk paths changed:"; echo "$HITS"
          # On push the PR gate already applied; report success so this required
          # context always reports (no deadlock — same as L1-dep-review being PR-only).
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "push run — informational only"; exit 0
          fi
          LABELS="$(gh pr view "${{ github.event.number }}" --repo "${{ github.repository }}" --json labels --jq '[.labels[].name]|join(",")')"
          if printf '%s' "$LABELS" | grep -q 'high-risk-ack'; then
            echo "high-risk-ack label present — human-acknowledged"; exit 0
          fi
          echo "::error::high-risk paths changed with no 'high-risk-ack' label — a human must review and apply it (see README 'High-risk src/ changes')"
          exit 1

  L1-gitleaks:                     # full-history secret scan with gitleaks' maintained ruleset.
    runs-on: ubuntu-latest         # Runs the CLI (via the official image) directly on the checkout —
    permissions:                   # NOT the gitleaks-action, whose ScanPullRequest calls the GitHub
      contents: read               # API and intermittently gets an HTML error page (a flaky false
    steps:                         # failure, not a leak). The CLI hits no API, so that path is gone;
      - uses: actions/checkout@v4  # only the image pull is network-flaky, and that is retried.
        with: { fetch-depth: 0 }   # full history, not just the tip
      - name: Gitleaks (CLI, full history; retry the image pull only)
        run: |
          set -euo pipefail
          IMG="ghcr.io/gitleaks/gitleaks:latest"
          for attempt in 1 2 3; do
            docker pull -q "$IMG" && break
            echo "gitleaks: image pull failed (attempt $attempt/3), retrying"; sleep "$((attempt * 5))"
          done
          # GIT_CONFIG safe.directory avoids git "dubious ownership" for the mounted
          # repo inside the container. gitleaks exits 1 on findings -> the job fails.
          docker run --rm \
            -e GIT_CONFIG_COUNT=1 -e GIT_CONFIG_KEY_0=safe.directory -e GIT_CONFIG_VALUE_0='*' \
            -v "$PWD:/repo" "$IMG" git /repo --redact --no-banner

  checks-selftest:                 # prove the checks BITE before trusting their silence (L0009)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Self-test checks against known-bad/good fixtures
        run: bash scripts/checks/selftest.sh

  L2-spec-traceability:            # every spec scenario (### S<n>) must be referenced by a test
    runs-on: ubuntu-latest         # as spec-NNN:S<n> — so a spec change can't merge stale coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Spec scenarios are covered by tests
        run: python3 scripts/checks/spec_traceability.py

  L2-tests:                        # backend test proof: JUnit 5 + Mockito on Java 21
    # NB: spec-derived behavioral invariants live HERE, as tests (CLAUDE.md → L2).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect relevant changes (fast path — skip build when no backend change)
        id: changes
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          # A ci.yml change re-runs everything; otherwise skip when no backend change.
          if git diff --name-only "$BASE"... | grep -qE '^src/backend/|^\.github/workflows/ci\.yml$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no src/backend changes — short-circuiting L2-tests (fast path)"
          fi
      - uses: actions/setup-java@v4
        if: steps.changes.outputs.run == 'true'
        with:
          distribution: temurin
          java-version: "21"
      - if: steps.changes.outputs.run == 'true'
        run: ./gradlew test --no-daemon
      - name: Integration tests (Testcontainers SQL Server; L2 per AGENTS.md = unit + integration)
        if: steps.changes.outputs.run == 'true'
        run: ./gradlew :sample-service:integrationTest --no-daemon

  L2-frontend-tests:               # frontend UI tests: Karma + Jasmine on headless Chrome
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect relevant changes (fast path — skip when no frontend change)
        id: changes
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          if git diff --name-only "$BASE"... | grep -qE '^src/frontend/|^\.github/workflows/ci\.yml$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no src/frontend changes — short-circuiting L2-frontend-tests (fast path)"
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.run == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: browser-actions/setup-chrome@v1
        if: steps.changes.outputs.run == 'true'
        id: setup-chrome
      - if: steps.changes.outputs.run == 'true'
        run: npm ci
      - if: steps.changes.outputs.run == 'true'
        run: npm test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

  L1-terraform:                    # IaC: format + validate (no apply, no creds)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  L2-backend-image:                # the service images build and serve health
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}   # tag images by commit SHA (matches deploy-backend)
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect relevant changes (fast path — skip image build when no backend change)
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          if git diff --name-only "$BASE"... | grep -qE '^src/backend/|^\.github/workflows/ci\.yml$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no src/backend changes — short-circuiting L2-backend-image (fast path)"
          fi
      - name: Build images
        if: steps.changes.outputs.run == 'true'
        run: |
          set -euo pipefail
          cd src/backend
          docker build -f api-gateway/Dockerfile -t "api-gateway:${IMAGE_TAG}" .
          docker build -f sample-service/Dockerfile -t "sample-service:${IMAGE_TAG}" .
      - name: Smoke — sample-service serves /health
        if: steps.changes.outputs.run == 'true'
        run: |
          set -euo pipefail
          docker run -d --name svc -p 8081:8081 "sample-service:${IMAGE_TAG}"
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8081/health | grep -q '"status":"ok"'; then
              echo "health ok"; exit 0
            fi
            sleep 3
          done
          echo "::error::sample-service did not become healthy"; docker logs svc; exit 1

  L3-diff-guard:                   # diff heuristics: blast radius, dangerous combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Blast radius + forbidden combos (scripts/checks/diff_guard.sh — selftested)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          git diff --name-only "$BASE"... | bash scripts/checks/diff_guard.sh

  L4-ai-review:                    # AI review gate: the reviewer subagent's rubric, in CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # merged-PR lookup on push runs (commits/{sha}/pulls)
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Reviewer findings on the diff
        env:
          GH_TOKEN: ${{ github.token }}
          L4_REVIEW_PROVIDER: ${{ vars.L4_REVIEW_PROVIDER || 'auto' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-8' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            # Push to main. If this SHA landed via a merged PR, L4 already ran at
            # PR time and the human merge IS the L5 approval — re-running would
            # re-escalate forced-high findings the human already signed off on,
            # turning main red and blocking deploys. Only review direct pushes
            # (the bypass this post-hoc run exists to catch). A gh/API failure
            # here fails the job — fail closed, never silently skip the review.
            MERGED_PR=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '[.[] | select(.merged_at != null)][0].number // empty')
            if [ -n "$MERGED_PR" ]; then
              echo "SHA landed via merged PR #$MERGED_PR — L4 reviewed it at PR time; human merge = L5 approval. Skipping post-hoc review."
              exit 0
            fi
            echo "::warning::direct push to main with no merged PR — post-hoc L4 review (gates should have run on a PR)"
            BASE="${{ github.event.before }}"
            git cat-file -e "$BASE^{commit}" 2>/dev/null || BASE="HEAD^"
          fi
          git diff "$BASE"... > /tmp/pr.diff
          if [ ! -s /tmp/pr.diff ]; then
            echo "empty diff — nothing to review"; exit 0
          fi
          python3 scripts/checks/ai_review.py \
            --diff /tmp/pr.diff \
            --rubric .claude/agents/reviewer.md \
            --output /tmp/l4-ai-review.md
