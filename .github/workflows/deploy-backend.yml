# Backend deploy: build both service images → push to ACR → update the Container Apps.
# Authenticates to Azure keylessly via GitHub OIDC (azure/login, no stored secret).
# Non-secret config comes from repo Variables set during the Terraform bootstrap.
# Liquibase runs on sample-service startup (SPRING_LIQUIBASE_ENABLED=true set in
# Terraform), so there is no separate migrate step here.
name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      rationale:
        description: "L5: why is this safe to ship? (recorded in docs/audit/log.md)"
        required: true
      rollback_plan:
        description: "How to undo (e.g. 'redeploy prior image' / 'revert PR #123')"
        required: false
      jira_key:
        description: "Linked Jira issue key (e.g. PROJ-123)"
        required: false

# Least-privilege floor; each job escalates to only what it needs (see per-job
# `permissions:` blocks). CONVENTION: a job calling the GitHub API must declare
# its own scope or it fails with "Resource not accessible by integration".
permissions:
  contents: read

jobs:
  gates:
    permissions:
      actions: read   # gh api: query agentic-sdlc-gates workflow-run conclusions
    # No branch protection on this plan, so deploys are the enforcement point:
    # require the agentic-sdlc-gates (L1–L4) run on this exact SHA to succeed
    # before anything ships. Fail closed on timeout or any non-success conclusion.
    runs-on: ubuntu-latest
    steps:
      - name: Require agentic-sdlc-gates success on this SHA (fail closed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            RUN=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}" \
              --jq '[.workflow_runs[] | select(.name=="agentic-sdlc-gates")][0] // empty')
            if [ -n "$RUN" ]; then
              STATUS=$(echo "$RUN" | jq -r .status)
              CONCLUSION=$(echo "$RUN" | jq -r .conclusion)
              if [ "$STATUS" = "completed" ]; then
                if [ "$CONCLUSION" = "success" ]; then
                  echo "gates passed on ${{ github.sha }}"; exit 0
                fi
                echo "::error::agentic-sdlc-gates concluded '$CONCLUSION' on ${{ github.sha }} — refusing to deploy"; exit 1
              fi
              echo "gates run in progress ($STATUS), waiting…"
            else
              echo "no gates run found yet for ${{ github.sha }}, waiting…"
            fi
            sleep 30
          done
          echo "::error::agentic-sdlc-gates did not complete within 30 minutes — fail closed"; exit 1

  deploy:
    # Skip until the Terraform bootstrap has set the repo variables — keeps main green
    # before the project exists.
    if: ${{ vars.AZURE_CLIENT_ID != '' }}
    needs: gates
    permissions:
      contents: write        # append + push the L5 row to docs/audit/log.md
      id-token: write        # Azure OIDC (azure/login), no stored secret
      pull-requests: read    # derive rationale from the merged PR on push deploys
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push images to ACR
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          az acr login --name "${REGISTRY%%.*}"
          cd src/backend
          for svc in api-gateway sample-service; do
            img="$REGISTRY/$svc:${IMAGE_TAG}"
            docker build -f "$svc/Dockerfile" -t "$img" .
            docker push "$img"
          done

      - name: Update the Container Apps to the new images
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          az containerapp update \
            --name "${{ vars.GATEWAY_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$REGISTRY/api-gateway:${IMAGE_TAG}"
          az containerapp update \
            --name "${{ vars.SAMPLE_SERVICE_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$REGISTRY/sample-service:${IMAGE_TAG}"

      - name: Verify the gateway is healthy
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS "https://${{ vars.API_HOST }}/actuator/health" | grep -q '"status":"UP"'; then
              echo "gateway healthy"; exit 0
            fi
            sleep 5
          done
          echo "::error::gateway did not become healthy after deploy"; exit 1

      # Runs only after the health check passes (a failed step stops the job), so
      # the audit log records deploys that actually succeeded — nothing else.
      - name: Record L5 deploy approval in the audit log
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_ENV: "production (backend)"
          DEPLOY_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          RATIONALE: ${{ inputs.rationale }}
          ROLLBACK: ${{ inputs.rollback_plan }}
          JIRA_KEY: ${{ inputs.jira_key }}
        run: bash scripts/record_deploy_approval.sh
