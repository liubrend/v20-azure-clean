# Frontend deploy: build the Angular bundle, push to Azure Static Web Apps.
# Uses the SWA deployment token (a GitHub secret); the backend stays OIDC-keyless.
name: deploy-frontend

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      rationale:
        description: "L5: why is this safe to ship? (recorded in docs/audit/log.md)"
        required: true
      rollback_plan:
        description: "How to undo (e.g. 'redeploy prior bundle' / 'revert PR #123')"
        required: false
      jira_key:
        description: "Linked Jira issue key (e.g. PROJ-123)"
        required: false

# Least-privilege floor; each job escalates to only what it needs (see per-job
# `permissions:` blocks). CONVENTION: a job calling the GitHub API must declare
# its own scope or it fails with "Resource not accessible by integration".
permissions:
  contents: read

jobs:
  gates:
    permissions:
      actions: read   # gh api: query agentic-sdlc-gates workflow-run conclusions
    # No branch protection on this plan, so deploys are the enforcement point:
    # require the agentic-sdlc-gates (L1–L4) run on this exact SHA to succeed
    # before anything ships. Fail closed on timeout or any non-success conclusion.
    runs-on: ubuntu-latest
    steps:
      - name: Require agentic-sdlc-gates success on this SHA (fail closed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            RUN=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}" \
              --jq '[.workflow_runs[] | select(.name=="agentic-sdlc-gates")][0] // empty')
            if [ -n "$RUN" ]; then
              STATUS=$(echo "$RUN" | jq -r .status)
              CONCLUSION=$(echo "$RUN" | jq -r .conclusion)
              if [ "$STATUS" = "completed" ]; then
                if [ "$CONCLUSION" = "success" ]; then
                  echo "gates passed on ${{ github.sha }}"; exit 0
                fi
                echo "::error::agentic-sdlc-gates concluded '$CONCLUSION' on ${{ github.sha }} — refusing to deploy"; exit 1
              fi
              echo "gates run in progress ($STATUS), waiting…"
            else
              echo "no gates run found yet for ${{ github.sha }}, waiting…"
            fi
            sleep 30
          done
          echo "::error::agentic-sdlc-gates did not complete within 30 minutes — fail closed"; exit 1

  deploy:
    # Skip until the bootstrap has set the repo variables / SWA token.
    if: ${{ vars.API_HOST != '' }}
    needs: gates
    permissions:
      contents: write        # append + push the L5 row to docs/audit/log.md
      pull-requests: read    # derive rationale from the merged PR on push deploys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - run: npm --prefix src/frontend ci

      - name: Bake the API base URL into the production env
        run: |
          set -euo pipefail
          f=src/frontend/src/environments/environment.prod.ts
          grep -q '__API_BASE_URL__' "$f" \
            || { echo "::error::placeholder __API_BASE_URL__ not found in $f"; exit 1; }
          sed -i "s|__API_BASE_URL__|https://${{ vars.API_HOST }}|" "$f"
          if grep -q '__API_BASE_URL__' "$f"; then
            echo "::error::placeholder was not replaced"; exit 1
          fi

      - run: npm --prefix src/frontend run build

      # Static Web Apps deploy. The bundle is already built above (skip_app_build),
      # so the action just uploads dist/. The deployment token is a GitHub secret.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: "src/frontend/dist/frontend/browser"
          skip_app_build: true
          skip_api_build: true

      # Runs only after a successful upload (a failed step stops the job), so the
      # audit log records deploys that actually shipped — nothing else.
      - name: Record L5 deploy approval in the audit log
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_ENV: "production (frontend)"
          DEPLOY_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          RATIONALE: ${{ inputs.rationale }}
          ROLLBACK: ${{ inputs.rollback_plan }}
          JIRA_KEY: ${{ inputs.jira_key }}
        run: bash scripts/record_deploy_approval.sh
