# v20-azure-clean finalized stack and verified dev commands.

cloud:
  provider: Azure

database:
  service: Azure SQL Database
  engine: Microsoft SQL Server
  why:
    - "Managed relational core with strong constraints, transactions, migrations"
    - "First-class Azure integration (Key Vault secrets, managed identity, Container Apps)"

object_storage:
  service: Azure Blob Storage
  why:
    - "Item attachments / binary blobs out of the relational store"
  data_path: "sample-service -> BlobStorageService -> Blob container"

backend:
  language: Java
  version: "21"
  framework: Spring Boot
  framework_version: "3.4"
  build: Gradle (Kotlin DSL)
  architecture: microservices
  api_style: RESTful
  migrations: Liquibase
  source_root: src/backend
  services:
    - name: api-gateway
      role: "edge — routes /api/** to sample-service, owns CORS; Spring Cloud Gateway"
      port: 8080
    - name: sample-service
      role: "domain — items REST API over Azure SQL + Blob Storage"
      port: 8081
  test:
    framework: "JUnit 5 + Mockito"
    integration: "Testcontainers (SQL Server) in a separate integrationTest source set"

frontend:
  framework: Angular
  version: "19"
  source_root: src/frontend
  hosting: Azure Static Web Apps   # static bundle only
  data_path: "Angular -> api-gateway -> sample-service -> Azure SQL"
  test:
    runner: "Karma + Jasmine (ChromeHeadless)"
  dev_commands:    # run from repo root; --prefix points npm at the frontend
    install: "npm --prefix src/frontend ci"
    test: "npm --prefix src/frontend test"      # ng test --watch=false --browsers=ChromeHeadlessCI
    serve: "npm --prefix src/frontend start"    # ng serve
    build: "npm --prefix src/frontend run build"

compute:
  target: Azure Container Apps
  registry: Azure Container Registry (ACR)
  secrets: Azure Key Vault (referenced as secret-backed env vars)
  identity: user-assigned managed identity (runtime = ACR pull + KV read; deploy = GitHub OIDC)

source_layout:
  backend: src/backend        # Gradle multi-module (api-gateway, sample-service)
  frontend: src/frontend

dev_commands:    # verified on Java 21 (Temurin); CI pins Java 21
  # Builds both microservices.
  install: "cd src/backend && ./gradlew build"
  # Runs the unit test suite (JUnit 5 + Mockito). No DB/Docker required.
  test: "cd src/backend && ./gradlew test"
  # Integration tests spin a throwaway SQL Server via Testcontainers (needs Docker).
  integration_test: "cd src/backend && ./gradlew :sample-service:integrationTest"
  # Serves a service locally. Set DATABASE_URL / BLOB_CONNECTION_STRING for real data.
  run: "cd src/backend && ./gradlew :sample-service:bootRun"
