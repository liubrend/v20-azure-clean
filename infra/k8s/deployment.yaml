# Backend Deployment. The Cloud SQL Auth Proxy runs as a native sidecar
# (initContainer with restartPolicy: Always — GKE 1.29+ GA) listening on 127.0.0.1:5432, which is
# where DATABASE_URL points. DATABASE_URL comes from a k8s Secret the deploy
# workflow syncs from Secret Manager — never in git. ${BACKEND_IMAGE} and
# ${CLOUDSQL_INSTANCE} are substituted at deploy time.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-backend
  namespace: default
  labels:
    app: app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-backend
  template:
    metadata:
      labels:
        app: app-backend
    spec:
      serviceAccountName: app-backend
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          restartPolicy: Always # native sidecar
          args:
            - "--private-ip"
            - "--port=5432"
            - "--exit-zero-on-sigterm"
            - "${CLOUDSQL_INSTANCE}"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: backend
          image: ${BACKEND_IMAGE}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db
                  key: DATABASE_URL
            - name: CORS_ALLOWED_ORIGINS
              value: "${FRONTEND_ORIGIN}"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
