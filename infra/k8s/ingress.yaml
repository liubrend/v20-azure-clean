# HTTPS entry point. Uses a global static IP (created in bootstrap) and a Google
# managed certificate for ${API_HOST}. The Angular SPA calls this host as its
# API_BASE_URL. ${API_HOST} is substituted at deploy time.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-backend
  namespace: default
  annotations:
    kubernetes.io/ingress.global-static-ip-name: app-backend-ip
    networking.gke.io/managed-certificates: app-backend-cert
spec:
  rules:
    - host: ${API_HOST}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: app-backend
                port:
                  number: 80
