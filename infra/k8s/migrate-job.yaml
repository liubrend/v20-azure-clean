# One-shot Alembic migration, run by the deploy workflow before rolling the new
# image. The name is suffixed with the per-deploy ${IMAGE_TAG} (the git SHA, unique
# per deploy) so applies never collide with a prior immutable Job; ttl cleans it up.
# The Cloud SQL proxy runs as a native sidecar (initContainer restartPolicy: Always,
# GKE 1.29+ GA); --exit-zero-on-sigterm stops it once `alembic upgrade head`
# completes so the Job can finish.
apiVersion: batch/v1
kind: Job
metadata:
  name: app-migrate-${IMAGE_TAG}
  namespace: default
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: app-backend
      restartPolicy: Never
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          restartPolicy: Always # native sidecar
          args:
            - "--private-ip"
            - "--port=5432"
            - "--exit-zero-on-sigterm"
            - "${CLOUDSQL_INSTANCE}"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: migrate
          image: ${BACKEND_IMAGE}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
