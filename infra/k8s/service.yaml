# Internal Service; the Ingress fronts it with HTTPS (the Angular SPA is served over
# HTTPS from Firebase Hosting, so the API must be HTTPS too — no mixed content).
apiVersion: v1
kind: Service
metadata:
  name: app-backend
  namespace: default
  annotations:
    # Use the BackendConfig health check (/health) for the GCE LB.
    cloud.google.com/backend-config: '{"default": "app-backend"}'
spec:
  type: ClusterIP
  selector:
    app: app-backend
  ports:
    - port: 80
      targetPort: 8080
