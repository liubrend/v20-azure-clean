# Pod identity. Annotated for GKE Workload Identity so the pod acts as the runtime
# Google SA (Cloud SQL Client + Secret accessor) — no key. ${RUNTIME_SA_EMAIL} is
# substituted by the deploy workflow from the Terraform output.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-backend
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: ${RUNTIME_SA_EMAIL}
